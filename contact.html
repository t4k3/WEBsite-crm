    <main class="pt-28 px-4 flex flex-col items-center">
      <h1 class="text-4xl font-bold mb-6 text-center" data-i18n="contact_title">
        Richiedi il tuo preventivo personalizzato
      </h1>

      <form
        action="sendmail_secure.php"
        method="POST"
        class="space-y-4 max-w-lg w-full bg-gray-50 border border-gray-200 p-8 rounded-2xl shadow-lg"
      >
        <input
          name="name"
          placeholder="Nome"
          required
          class="w-full p-3 text-black rounded"
          data-i18n-placeholder="form_name"
        />
        <input
          name="email"
          type="email"
          placeholder="Email"
          required
          class="w-full p-3 text-black rounded"
          data-i18n-placeholder="form_email"
        />
        <input
          name="country"
          placeholder="Paese"
          class="w-full p-3 text-black rounded"
          data-i18n-placeholder="form_country"
        />
        <input
          name="city"
          placeholder="Città"
          class="w-full p-3 text-black rounded"
          data-i18n-placeholder="form_city"
        />
        <input
          name="zip"
          placeholder="CAP"
          class="w-full p-3 text-black rounded"
          data-i18n-placeholder="form_zip"
        />
     
        <textarea
          name="message"
          rows="4"
          placeholder="Note aggiuntive"
          class="w-full p-3 text-black rounded"
          data-i18n-placeholder="form_message"
        ></textarea>

        <!-- Honeypot anti-bot -->
        <input type="text" name="company" style="display:none" tabindex="-1" autocomplete="off" />

        <!-- GDPR -->
        <label class="flex items-start gap-2 text-sm text-gray-600">
          <input type="checkbox" name="consent" required class="mt-1" />
          <span data-i18n="privacy_consent">
            Acconsento al trattamento dei dati secondo la
            <a href="privacy.html" class="text-[#0096e0] underline hover:text-[#0077b3]">Privacy Policy</a>.
          </span>
        </label>

        <button
          type="submit"
          class="w-full bg-[#f59000] text-white px-6 py-3 rounded-full font-medium hover:bg-[#e08400] transition"
          data-i18n="cta"
        >
          Invia richiesta
        </button>
      </form>

      <p class="mt-10 text-center text-gray-500 text-sm" data-i18n="contact_alt">
        Oppure scrivi a
        <a href="mailto:info@takeoff.pro" class="text-[#0096e0]">info@takeoff.pro</a>
      </p>
