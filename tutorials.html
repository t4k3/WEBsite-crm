<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="tutorial_page_title">Tutorial – Takeoff.pro</title>
        <link rel="icon" href="/assets/img/favicon.ico" />

        <!-- ✅ Tailwind -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- ✅ Font Fauna -->
        <style>
            @font-face {
                font-family: "Fauna";
                src: url("/assets/fonts/fauna-thin.woff2") format("woff2");
                font-weight: 300;
                font-style: normal;
                font-display: swap;
            }

            body {
                font-family:
                    "Fauna", "Helvetica Neue", Helvetica, Arial, sans-serif;
                background-color: black;
                color: white;
            }
        </style>
    </head>

    <body>
        <!-- ================= NAVBAR ================= -->
        <nav
            class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-black/70 backdrop-blur-md"
        >
            <!-- LOGO -->
            <a href="index.html" class="flex items-center gap-2">
                <img
                    src="/assets/img/logo.png"
                    alt="Logo Wazlley"
                    class="h-10"
                />
            </a>

            <!-- MENU LINKS -->
            <div class="flex gap-4 text-sm font-light">
                <a
                    href="index.html#home"
                    class="hover:text-yellow-400"
                    data-i18n="nav_home"
                    >Home</a
                >
                <a
                    href="contact.html"
                    class="hover:text-yellow-400"
                    data-i18n="nav_contact"
                    >Contatti</a
                >
                <a
                    href="tutorials.html"
                    class="hover:text-yellow-400 text-yellow-400 font-semibold"
                    data-i18n="nav_tutorials"
                    >Tutorial</a
                >
                <a
                    href="privacy.html"
                    class="hover:text-yellow-400"
                    data-i18n="nav_privacy"
                    >Privacy</a
                >
            </div>

            <!-- LANGUAGE SWITCH -->
            <div class="flex gap-2">
                <button
                    class="lang-switch text-lg hover:opacity-80 transition"
                    data-lang="it"
                    title="Italiano"
                >
                    🇮🇹
                </button>
                <button
                    class="lang-switch text-lg hover:opacity-80 transition"
                    data-lang="en"
                    title="English (USA)"
                >
                    🇺🇸
                </button>
            </div>
        </nav>

        <!-- ================= MAIN CONTENT ================= -->
        <main class="pt-28 px-6">
            <h1
                class="text-4xl font-bold mb-8 text-center"
                data-i18n="tutorial_title"
            >
                Video Tutorial
            </h1>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- ⚠️ TODO: Sostituire VIDEO_ID_1, VIDEO_ID_2, VIDEO_ID_3 con gli ID reali dei video YouTube -->
                <!-- Esempio: se il video è https://www.youtube.com/watch?v=dQw4w9WgXcQ, l'ID è dQw4w9WgXcQ -->

                <div class="bg-gray-900 p-4 rounded-xl shadow-lg">
                    <iframe
                        class="w-full aspect-video rounded-lg"
                        src="https://www.youtube.com/embed/VIDEO_ID_1"
                        allowfullscreen
                    ></iframe>
                    <h2
                        class="mt-3 font-semibold text-lg"
                        data-i18n="tutorial_setup"
                    >
                        Montaggio e trasporto
                    </h2>
                </div>

                <div class="bg-gray-900 p-4 rounded-xl shadow-lg">
                    <iframe
                        class="w-full aspect-video rounded-lg"
                        src="https://www.youtube.com/embed/VIDEO_ID_2"
                        allowfullscreen
                    ></iframe>
                    <h2
                        class="mt-3 font-semibold text-lg"
                        data-i18n="tutorial_display"
                    >
                        Configurazione display
                    </h2>
                </div>

                <div class="bg-gray-900 p-4 rounded-xl shadow-lg">
                    <iframe
                        class="w-full aspect-video rounded-lg"
                        src="https://www.youtube.com/embed/VIDEO_ID_3"
                        allowfullscreen
                    ></iframe>
                    <h2
                        class="mt-3 font-semibold text-lg"
                        data-i18n="tutorial_bluetooth"
                    >
                        Connessione Bluetooth e App
                    </h2>
                </div>
            </div>
        </main>

        <!-- ================= FOOTER ================= -->
        <footer
            class="bg-gray-950 text-center py-6 text-sm text-gray-400 mt-16"
        >
            <p data-i18n="footer_text">
                © 2025 Wazlley by Takeoff.pro — sport innovation
            </p>
            <p>
                <a href="mailto:info@takeoff.pro" class="text-yellow-400"
                    >info@takeoff.pro</a
                >
            </p>
        </footer>

        <!-- ================= SCRIPT MULTILINGUA ================= -->
        <script src="/assets/js/lang.js"></script>
    </body>
</html>
