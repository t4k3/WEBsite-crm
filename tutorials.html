<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="tutorial_page_title">Tutorial – Takeoff.pro</title>
        <link rel="icon" href="/assets/img/favicon.ico" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            body {
                font-family: "Inter", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
                background-color: #ffffff;
                color: #15140f;
            }
            h1, h2, h3 {
                font-family: "Archivo", "Inter", sans-serif;
                letter-spacing: -0.01em;
            }
        </style>
    </head>

    <body>
        <!-- ================= NAVBAR ================= -->
        <nav
            class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/85 border-b border-gray-200 text-gray-800 backdrop-blur-md"
        >
            <!-- LOGO -->
            <a href="index.html" class="flex items-center gap-2">
                <img
                    src="/assets/img/logo.png"
                    alt="Logo Wazlley"
                    class="h-10"
                />
            </a>

            <!-- MENU LINKS -->
            <div class="flex gap-4 text-sm font-light">
                <a
                    href="index.html#home"
                    class="hover:text-lime-600"
                    data-i18n="nav_home"
                    >Home</a
                >
                <a
                    href="contact.html"
                    class="hover:text-lime-600"
                    data-i18n="nav_contact"
                    >Contatti</a
                >
                <a
                    href="tutorials.html"
                    class="hover:text-lime-600 text-lime-600 font-semibold"
                    data-i18n="nav_tutorials"
                    >Tutorial</a
                >
                <a
                    href="privacy.html"
                    class="hover:text-lime-600"
                    data-i18n="nav_privacy"
                    >Privacy</a
                >
            </div>

            <!-- LANGUAGE SWITCH -->
            <div class="flex gap-2">
                <button
                    class="lang-switch text-lg hover:opacity-80 transition"
                    data-lang="it"
                    title="Italiano"
                >
                    🇮🇹
                </button>
                <button
                    class="lang-switch text-lg hover:opacity-80 transition"
                    data-lang="en"
                    title="English (USA)"
                >
                    🇺🇸
                </button>
            </div>
        </nav>

        <!-- ================= MAIN CONTENT ================= -->
        <main class="pt-28 px-6">
            <h1
                class="text-4xl font-bold mb-8 text-center"
                data-i18n="tutorial_title"
            >
                Video Tutorial
            </h1>

            <div
                class="max-w-3xl mx-auto rounded-xl overflow-hidden border border-gray-200 shadow-lg bg-black"
            >
                <iframe
                    class="w-full aspect-video"
                    src="https://www.youtube.com/embed/BfFndaBmapA"
                    title="Takeoff.pro Volleyball Machine"
                    loading="lazy"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen
                ></iframe>
            </div>
        </main>

        <!-- ================= FOOTER ================= -->
        <footer
            class="bg-gray-50 border-t border-gray-200 text-center py-6 text-sm text-gray-500 mt-16"
        >
            <p data-i18n="footer_text">
                © 2025 Wazlley by Takeoff.pro — sport innovation
            </p>
            <p>
                <a href="mailto:info@takeoff.pro" class="text-lime-600"
                    >info@takeoff.pro</a
                >
            </p>
        </footer>

        <!-- ================= SCRIPT MULTILINGUA ================= -->
        <script src="/assets/js/lang.js?v=22"></script>
    </body>
</html>
